packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@sentry/cli': true
  '@swc/core': true
  argon2: true
  esbuild: true
  msw: true
  prisma: true
  protobufjs: true
  unrs-resolver: true
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/engines'
  - '@sentry/cli'
  - '@swc/core'
  - argon2
  - esbuild
  - msw
  - prisma
  - protobufjs
  - unrs-resolver

minimumReleaseAgeExclude:
  - hasown
  - react-router
  - react-router-dom
  - tldts-core
  - zustand
  - '@storybook/addon-a11y@10.4.2'
  - '@storybook/addon-docs@10.4.2'
  - '@storybook/builder-vite@10.4.2'
  - '@storybook/csf-plugin@10.4.2'
  - '@storybook/react-dom-shim@10.4.2'
  - '@storybook/react-vite@10.4.2'
  - '@storybook/react@10.4.2'
  - storybook@10.4.2
  - react-hook-form@7.78.0
  - '@heejun/eslint-config@5.0.0'
  - '@heejun/prettier-config@3.0.0'
  - '@heejun/deskcloud@0.1.0'
  - '@heejun/platform-bridge@0.1.0'

overrides:
  zod@3.24.4: 3.25.76
  handlebars: '>=4.7.9'
  multer: '>=2.2.0'
  undici: '^7.28.0'
  ws: '>=8.21.0'
  form-data: '>=4.0.6'
  hono: '>=4.12.25'
  find-my-way: '>=8.2.2'
  '@fastify/middie': '>=9.3.2'
  fastify: '>=5.7.2'
  fast-uri: '>=3.1.2'
  path-to-regexp: '>=6.3.0'
  serialize-javascript: '>=7.0.3'
  piscina: '>=4.9.3'
  drizzle-orm: '>=0.45.2'
  vitest: '>=4.1.9'
  '@vitest/coverage-v8': '>=4.1.9'
  '@vitest/ui': '>=4.1.9'
  vite: '>=8.0.16'
  jspdf: '>=4.2.1'

auditConfig:
  ignoreGhsas:
    - GHSA-2p57-rm9w-gvfp
