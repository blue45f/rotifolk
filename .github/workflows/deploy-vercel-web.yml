name: Deploy web to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'apps/api/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-vercel-web.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Report missing optional Vercel token
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "VERCEL_TOKEN is not configured."
          echo "Production web deployment is handled by the Vercel Git integration on main pushes."

      - name: Report Vercel Git integration deployment
        if: env.VERCEL_TOKEN != ''
        run: |
          echo "VERCEL_TOKEN is configured."
          echo "Skipping direct 'vercel deploy' to avoid duplicate production deployments and free-plan API deployment quota failures."
          echo "Production web deployment is handled by the Vercel Git integration on main pushes."
