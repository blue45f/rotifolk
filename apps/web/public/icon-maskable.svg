<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Rotifolk">
  <!--
    Maskable variant of favicon.svg. The launcher supplies the shape (circle/squircle),
    so the cellar plate bleeds edge to edge and the glyph is scaled to 90% to stay inside
    the 40%-radius safe zone. Source art for icon-maskable-512.png / apple-touch-icon.png.
  -->
  <defs>
    <radialGradient id="cellar" cx="24" cy="17" r="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7d2942" />
      <stop offset="0.62" stop-color="#4b1831" />
      <stop offset="1" stop-color="#171827" />
    </radialGradient>
  </defs>
  <rect width="64" height="64" fill="url(#cellar)" />
  <g transform="translate(32 32) scale(0.9) translate(-32 -32)">
    <circle cx="32" cy="32" r="22" fill="none" stroke="#d9a84e" stroke-width="2" opacity="0.38" />
    <path d="M22 18c0 10 4.2 16.5 10 16.5S42 28 42 18" fill="none" stroke="#faedc4" stroke-width="3.4" stroke-linecap="round" />
    <path d="M32 34.5v12.5M24.5 48.5h15" stroke="#faedc4" stroke-width="3.4" stroke-linecap="round" />
    <path d="M23.5 25c4.5 3.5 12.3 3.5 17 0" stroke="#d9a84e" stroke-width="3" stroke-linecap="round" />
    <circle cx="18" cy="32" r="3.2" fill="#d9a84e" />
    <circle cx="46" cy="32" r="3.2" fill="#d9a84e" />
  </g>
</svg>
