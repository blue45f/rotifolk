<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F6EFE6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#211A14" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="와인·커피·차 로테이션 모임. 모르는 사람들이 진짜 친해지는 5분 라운드 — Rotifolk"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rotifolk" />

    <!--
      Static OG / Twitter / canonical defaults. usePageMeta() (src/hooks/usePageMeta.ts)
      enhances title + description + canonical/og:url per route at runtime; these are
      the crawler-safe fallbacks for bots that skip JS. Production base URL is a best
      guess — if the domain changes, update SITE_ORIGIN (usePageMeta.ts) with it.
    -->
    <link rel="canonical" href="https://rotifolk.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rotifolk" />
    <meta property="og:title" content="Rotifolk · 로테이션 파티 매칭" />
    <meta
      property="og:description"
      content="와인·커피·차 로테이션 모임. 모르는 사람들이 진짜 친해지는 5분 라운드 — Rotifolk"
    />
    <meta property="og:url" content="https://rotifolk.vercel.app/" />
    <meta property="og:image" content="https://rotifolk.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Rotifolk — 와인·커피·차·위스키 로테이션 파티 매칭" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rotifolk · 로테이션 파티 매칭" />
    <meta
      name="twitter:description"
      content="와인·커피·차 로테이션 모임. 모르는 사람들이 진짜 친해지는 5분 라운드 — Rotifolk"
    />
    <meta name="twitter:image" content="https://rotifolk.vercel.app/og.png" />
    <meta name="twitter:image:alt" content="Rotifolk — 와인·커피·차·위스키 로테이션 파티 매칭" />

    <!--
      Structured data (JSON-LD): sitewide WebSite (+ SearchAction → /search?q=,
      see src/pages/search/SearchPage.tsx) and Organization. Party detail pages
      additionally inject a per-party schema.org Event at runtime via
      usePageMeta({ jsonLd }) (src/hooks/usePageMeta.ts). Keep the base URL in
      sync with the canonical/OG tags above and SITE_ORIGIN (usePageMeta.ts).
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "name": "Rotifolk",
            "url": "https://rotifolk.vercel.app/",
            "inLanguage": "ko",
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://rotifolk.vercel.app/search?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "Organization",
            "name": "Rotifolk",
            "url": "https://rotifolk.vercel.app/",
            "logo": "https://rotifolk.vercel.app/og.png"
          }
        ]
      }
    </script>

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <title>Rotifolk · 로테이션 파티 매칭</title>
    <!--
      No-FOUC theme bootstrap: set data-theme before first paint so dark/system
      users never flash the light cellar. Mirrors resolveTheme() in
      src/store/themeStore.ts (THEME_STORAGE_KEY); keep the two in lockstep.
      Defensive — never throws (private-mode localStorage, malformed JSON).
    -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('rotifolk-theme')
          var pref = stored ? JSON.parse(stored).state.theme : 'system'
          var prefersDark =
            !!window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          var theme = pref === 'dark' || (pref !== 'light' && prefersDark) ? 'dark' : 'light'
          document.documentElement.dataset.theme = theme
        } catch (e) {
          /* private mode / parse error — the React effect will apply the theme */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
