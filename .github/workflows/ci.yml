name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm run verify

      - name: Seed (smoke)
        env:
          DATABASE_URL: 'file:./prisma/dev.db'
          JWT_SECRET: ci-secret
        run: |
          rm -f apps/api/prisma/dev.db apps/api/prisma/prisma/dev.db
          pnpm --filter @rotifolk/api prisma:push --accept-data-loss
          pnpm --filter @rotifolk/api seed
