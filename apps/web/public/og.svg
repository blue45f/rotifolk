<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Rotifolk — 로테이션 파티 매칭">
  <defs>
    <!-- Wine cellar at twilight: ink → burgundy, the brand's signature gradient. -->
    <radialGradient id="cellar" cx="34%" cy="18%" r="95%" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7d2942" />
      <stop offset="0.5" stop-color="#4b1831" />
      <stop offset="1" stop-color="#171827" />
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faedc4" />
      <stop offset="0.5" stop-color="#d9a84e" />
      <stop offset="1" stop-color="#b4862b" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#c9627f" stop-opacity="0.55" />
      <stop offset="1" stop-color="#c9627f" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="630" fill="url(#cellar)" />
  <!-- Wine glow bloom (rose accent), top-left + lower-right, per grad-wine-glow token -->
  <circle cx="250" cy="150" r="340" fill="url(#glow)" />
  <circle cx="980" cy="560" r="300" fill="url(#glow)" opacity="0.7" />

  <!-- Decorative gold cellar ring (echoes favicon) -->
  <circle cx="935" cy="300" r="232" fill="none" stroke="#d9a84e" stroke-width="2.5" opacity="0.30" />
  <circle cx="935" cy="300" r="186" fill="none" stroke="#d9a84e" stroke-width="1.5" opacity="0.18" />

  <!-- Wine glass emblem (favicon motif), gold-on-cellar, right side -->
  <g transform="translate(935 300)" stroke="url(#gold)" stroke-linecap="round" fill="none">
    <path d="M-86 -78c0 78 33 128 86 128s86 -50 86 -128" stroke-width="11" />
    <path d="M-65 -22c35 27 95 27 130 0" stroke="#d9a84e" stroke-width="9" opacity="0.85" />
    <path d="M0 50v98M-58 148h116" stroke-width="11" />
  </g>

  <!-- Four category accents: wine, coffee, tea, whisky (real accentHex tokens) -->
  <g transform="translate(935 300)">
    <circle cx="-150" cy="0" r="13" fill="#7A1F3D" />
    <circle cx="-50" cy="-142" r="13" fill="#6B4226" />
    <circle cx="150" cy="0" r="13" fill="#6B8E5A" />
    <circle cx="50" cy="142" r="13" fill="#B47433" />
  </g>

  <!-- Wordmark + tagline (Pretendard-ish system stack; renders crisp via Chrome) -->
  <g font-family="'Pretendard', -apple-system, 'Segoe UI', Roboto, sans-serif">
    <text x="96" y="300" fill="#faedc4" font-size="118" font-weight="800" letter-spacing="-3">Rotifolk</text>
    <rect x="100" y="332" width="120" height="6" rx="3" fill="url(#gold)" />
    <text x="96" y="408" fill="#f4e3c2" font-size="48" font-weight="700" letter-spacing="-1">로테이션 파티 매칭</text>
    <text x="96" y="470" fill="#e7c9b8" font-size="30" font-weight="500" opacity="0.92">와인 · 커피 · 차 · 위스키 로테이션 모임</text>
    <text x="96" y="514" fill="#cfa9b6" font-size="26" font-weight="500" opacity="0.85">모르는 사람들이 진짜 친해지는 5분 라운드</text>
  </g>
</svg>
