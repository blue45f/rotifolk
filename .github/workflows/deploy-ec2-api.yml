name: Deploy API to EC2

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'package.json'
      - '!**/*.md'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.dockerignore'
      - '.github/workflows/deploy-ec2-api.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EC2_SECURITY_GROUP_ID: ${{ secrets.EC2_SECURITY_GROUP_ID }}
      API_IMAGE: rotifolk-api:${{ github.sha }}
      API_LATEST_IMAGE: rotifolk-api:latest
      API_CONTAINER: rotifolk-api
      API_ENV_FILE: /opt/rotifolk-runtime.env
      API_DATA_VOLUME: rotifolk-data
      API_NETWORK: termsdesk_default

    steps:
      - uses: actions/checkout@v6

      - name: Skip deployment when EC2 secrets are not configured
        if: env.EC2_HOST == '' || env.EC2_USER == '' || env.EC2_SSH_KEY == '' || env.AWS_ACCESS_KEY_ID == '' || env.AWS_SECRET_ACCESS_KEY == '' || env.AWS_REGION == '' || env.EC2_SECURITY_GROUP_ID == ''
        run: echo "EC2/AWS deployment secrets are not fully configured; skipping EC2 deployment."

      - name: Configure AWS credentials
        if: env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.EC2_SECURITY_GROUP_ID != ''
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Authorize runner SSH ingress
        if: env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.EC2_SECURITY_GROUP_ID != ''
        run: |
          set -euo pipefail
          RUNNER_IP="$(curl -fsSL https://api.ipify.org)"
          RUNNER_SSH_CIDR="${RUNNER_IP}/32"
          echo "RUNNER_SSH_CIDR=$RUNNER_SSH_CIDR" >> "$GITHUB_ENV"
          aws ec2 authorize-security-group-ingress \
            --region "$AWS_REGION" \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${RUNNER_SSH_CIDR},Description=github-actions-${GITHUB_RUN_ID}}]" \
            || true

      - name: Configure SSH
        if: env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.EC2_SECURITY_GROUP_ID != ''
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/rotifolk_ec2.pem
          chmod 600 ~/.ssh/rotifolk_ec2.pem
          ssh-keyscan -T 20 -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Build API image
        if: env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.EC2_SECURITY_GROUP_ID != ''
        env:
          DOCKER_BUILDKIT: 1
        run: |
          set -euo pipefail
          docker build -f apps/api/Dockerfile -t "$API_IMAGE" -t "$API_LATEST_IMAGE" .

      - name: Load API image into EC2
        if: env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.EC2_SECURITY_GROUP_ID != ''
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/rotifolk_ec2.pem -o BatchMode=yes -o ConnectTimeout=20 ${EC2_USER}@${EC2_HOST}"

          $SSH "sudo docker image prune -f && sudo docker builder prune -f --filter until=24h"
          docker save "$API_IMAGE" "$API_LATEST_IMAGE" | gzip | $SSH "gunzip | sudo docker load"

      - name: Restart API container
        if: env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.EC2_SECURITY_GROUP_ID != ''
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/rotifolk_ec2.pem -o BatchMode=yes -o ConnectTimeout=20 ${EC2_USER}@${EC2_HOST}"

          $SSH "
            set -euo pipefail
            sudo docker rm -f '$API_CONTAINER' || true
            sudo docker run -d \
              --name '$API_CONTAINER' \
              --restart unless-stopped \
              --env-file '$API_ENV_FILE' \
              --network '$API_NETWORK' \
              -v '$API_DATA_VOLUME':/app/data \
              '$API_IMAGE'
          "

      - name: Smoke test API
        if: env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.AWS_REGION != '' && env.EC2_SECURITY_GROUP_ID != ''
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/rotifolk_ec2.pem -o BatchMode=yes -o ConnectTimeout=20 ${EC2_USER}@${EC2_HOST}"

          $SSH "
            set -euo pipefail
            for attempt in \$(seq 1 30); do
              if sudo docker exec '$API_CONTAINER' node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>{if(!r.ok)process.exit(1);return r.text()}).then(console.log)\"; then
                break
              fi
              sleep 2
            done
            sudo docker exec '$API_CONTAINER' node -e \"fetch('http://127.0.0.1:3000/api/auth/config').then((r)=>{if(!r.ok)process.exit(1);return r.text()}).then(console.log)\"
          "

      - name: Cleanup EC2 build artifacts
        if: always() && env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != ''
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/rotifolk_ec2.pem -o BatchMode=yes -o ConnectTimeout=20 ${EC2_USER}@${EC2_HOST}"
          $SSH "sudo docker image prune -f && sudo docker builder prune -f --filter until=24h" || true

      - name: Revoke runner SSH ingress
        if: always() && env.RUNNER_SSH_CIDR != '' && env.AWS_REGION != '' && env.EC2_SECURITY_GROUP_ID != ''
        run: |
          set -euo pipefail
          aws ec2 revoke-security-group-ingress \
            --region "$AWS_REGION" \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_SSH_CIDR" \
            || true
