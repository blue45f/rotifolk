<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Rotifolk">
  <defs>
    <!-- Rich wine-cellar gradient -->
    <linearGradient id="cellar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#881337" />
      <stop offset="50%" stop-color="#4c0519" />
      <stop offset="100%" stop-color="#0f050b" />
    </linearGradient>
    <!-- Elegant gold/amber gradient for wine and lights -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#eab308" flood-opacity="0.4" />
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#cellar)" stroke="#4c0519" stroke-width="1.5" />
  <rect x="5.5" y="5.5" width="53" height="53" rx="16.5" stroke="#fef08a" stroke-opacity="0.12" stroke-width="2.5" />
  
  <!-- Sleek clinking wine glasses with rotation arcs -->
  <g filter="url(#glow)">
    <!-- Social connection circle (dotted) -->
    <circle cx="32" cy="32" r="21" fill="none" stroke="url(#gold)" stroke-dasharray="2 3" stroke-width="1.8" opacity="0.6" />
    
    <!-- Wine glass 1 (left, tilted right) -->
    <g transform="translate(32 32) rotate(-15) translate(-32 -32)">
      <path d="M 21 16 C 21 24, 25 29, 29 29 C 33 29, 37 24, 37 16" stroke="#faedc4" stroke-width="2.5" fill="none" stroke-linecap="round" />
      <path d="M 29 29 L 29 42" stroke="#faedc4" stroke-width="2.5" stroke-linecap="round" />
      <path d="M 24 42 L 34 42" stroke="#faedc4" stroke-width="2.2" stroke-linecap="round" />
      <path d="M 22 23 C 25 25, 33 25, 36 23" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round" />
    </g>
    
    <!-- Wine glass 2 (right, tilted left) -->
    <g transform="translate(32 32) rotate(15) translate(-32 -32)">
      <path d="M 27 16 C 27 24, 31 29, 35 29 C 39 29, 43 24, 43 16" stroke="#faedc4" stroke-width="2.5" fill="none" stroke-linecap="round" />
      <path d="M 35 29 L 35 42" stroke="#faedc4" stroke-width="2.5" stroke-linecap="round" />
      <path d="M 30 42 L 40 42" stroke="#faedc4" stroke-width="2.2" stroke-linecap="round" />
      <path d="M 28 23 C 31 25, 39 25, 42 23" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round" />
    </g>
  </g>
</svg>
