name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @rotifolk/api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Seed (smoke)
        env:
          DATABASE_URL: 'file:./prisma/dev.db'
          JWT_SECRET: ci-secret
        run: |
          rm -f apps/api/prisma/dev.db apps/api/prisma/prisma/dev.db
          pnpm --filter @rotifolk/api prisma:push --accept-data-loss
          pnpm --filter @rotifolk/api seed
