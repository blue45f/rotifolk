# Render Blueprint for the Rotifolk BACKEND (@rotifolk/api — NestJS + Socket.IO).
#
# This is the backend counterpart to the existing FRONTEND deploy
# (.github/workflows/deploy-vercel-web.yml ships apps/web to Vercel). The web
# SPA lives on Vercel; this blueprint hosts the API (REST + WebSocket) on Render.
#
# HOW TO USE (manual, one-time — Render Blueprints are NOT applied by CI):
#   1. Render dashboard > New > Blueprint, point it at this repo.
#   2. Render reads this file and provisions the web service + persistent disk.
#   3. Fill the `sync: false` secrets in the dashboard: JWT_SECRET, CONTACT_PEPPER,
#      CORS_ORIGIN. The blueprint deliberately never hard-codes secrets.
#   4. preDeployCommand runs `prisma db push` against the SQLite file on the
#      persistent disk before each deploy (idempotent — schema-sync, not migrations,
#      because this repo has no migration history; it uses db push).
#
# DATABASE NOTE (accurate to THIS repo):
#   apps/api/src/prisma/prisma.service.ts uses Prisma 7 with the
#   better-sqlite3 driver adapter — SQLite ONLY. The DB is a file, so it MUST
#   live on a PERSISTENT DISK or all data is lost on every deploy/restart.
#   The schema comment mentions Postgres, but switching requires swapping the
#   driver adapter first; the live setup is SQLite. See docs/DEPLOYMENT.md.
#
# WEBSOCKET NOTE: Socket.IO (live parties) works on Render web services — no
#   special config needed beyond the single web service below.

services:
  - type: web
    name: rotifolk-api
    runtime: docker
    # Reuse the multi-stage production Dockerfile (node:22-alpine, prod-only
    # deps via `pnpm deploy --prod`, CMD `pnpm run start`).
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: . # build context = repo root (workspace + packages/shared)
    plan: starter # free plan has NO persistent disk; SQLite needs one
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health # HealthController in apps/api/src/modules/health
    # The image already carries the Prisma CLI (installed to /opt/prisma and put
    # on PATH/NODE_PATH by the Dockerfile), so call it directly — no network fetch.
    # The image also runs this same push in its entrypoint, so this is a belt-and-
    # suspenders schema sync (idempotent). db push, not migrate: no migration history.
    preDeployCommand: prisma db push --schema ./prisma/schema.prisma --accept-data-loss
    disk:
      name: rotifolk-sqlite
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000 # Render routes external traffic to this port
      - key: DATABASE_URL
        # SQLite file on the persistent disk (survives deploys/restarts).
        value: file:/app/data/prod.db
      - key: JWT_SECRET
        sync: false # set a long random secret in the Render dashboard
      - key: CONTACT_PEPPER
        sync: false # stable secret for contact (phone) hashing
      - key: CORS_ORIGIN
        # Comma-separated allowlist for app.enableCors in main.ts.
        # Set to your Vercel web origin(s), e.g. https://rotifolk.vercel.app
        sync: false
