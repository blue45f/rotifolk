<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Rotifolk — 로테이션 파티 매칭">
  <defs>
    <!-- Wine cellar at twilight: ink → burgundy, the brand's signature gradient. -->
    <radialGradient id="cellar" cx="34%" cy="18%" r="95%" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#881337" />
      <stop offset="0.5" stop-color="#4c0519" />
      <stop offset="1" stop-color="#0f050b" />
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef08a" />
      <stop offset="0.5" stop-color="#eab308" />
      <stop offset="1" stop-color="#ca8a04" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#be123c" stop-opacity="0.5" />
      <stop offset="1" stop-color="#be123c" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="630" fill="url(#cellar)" />
  <circle cx="250" cy="150" r="340" fill="url(#glow)" />
  <circle cx="980" cy="560" r="300" fill="url(#glow)" opacity="0.7" />

  <!-- Decorative gold cellar ring -->
  <circle cx="935" cy="300" r="232" fill="none" stroke="#eab308" stroke-width="2.5" opacity="0.30" />
  <circle cx="935" cy="300" r="186" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.18" />

  <!-- Clinking wine glasses emblem from favicon.svg, scaled on the right side -->
  <g transform="translate(935 300) scale(4)" stroke="url(#gold)" stroke-linecap="round" fill="none">
    <!-- Social connection circle (dotted) -->
    <circle cx="0" cy="0" r="21" fill="none" stroke="url(#gold)" stroke-dasharray="2 3" stroke-width="1.2" opacity="0.5" />
    
    <!-- Wine glass 1 (left, tilted right) -->
    <g transform="rotate(-15)">
      <path d="M -11 -16 C -11 -8, -7 -3, -3 -3 C 1 -3, 5 -8, 5 -16" stroke="#faedc4" stroke-width="2" fill="none" stroke-linecap="round" />
      <path d="M -3 -3 L -3 10" stroke="#faedc4" stroke-width="2" stroke-linecap="round" />
      <path d="M -8 10 L 2 10" stroke="#faedc4" stroke-width="1.8" stroke-linecap="round" />
      <path d="M -10 -9 C -7 -7, 1 -7, 4 -9" stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-linecap="round" />
    </g>
    
    <!-- Wine glass 2 (right, tilted left) -->
    <g transform="rotate(15)">
      <path d="M -5 -16 C -5 -8, -1 -3, 3 -3 C 7 -3, 11 -8, 11 -16" stroke="#faedc4" stroke-width="2" fill="none" stroke-linecap="round" />
      <path d="M 3 -3 L 3 10" stroke="#faedc4" stroke-width="2" stroke-linecap="round" />
      <path d="M -2 10 L 8 10" stroke="#faedc4" stroke-width="1.8" stroke-linecap="round" />
      <path d="M -4 -9 C -1 -7, 7 -7, 10 -9" stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-linecap="round" />
    </g>
  </g>

  <!-- Four category accents: wine, coffee, tea, whisky -->
  <g transform="translate(935 300)">
    <circle cx="-150" cy="0" r="13" fill="#be123c" />
    <circle cx="-50" cy="-142" r="13" fill="#78350f" />
    <circle cx="150" cy="0" r="13" fill="#15803d" />
    <circle cx="50" cy="142" r="13" fill="#b45309" />
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="'Pretendard', -apple-system, 'Segoe UI', Roboto, sans-serif">
    <text x="96" y="300" fill="#faedc4" font-size="118" font-weight="800" letter-spacing="-3">Rotifolk</text>
    <rect x="100" y="332" width="120" height="6" rx="3" fill="url(#gold)" />
    <text x="96" y="408" fill="#f4e3c2" font-size="48" font-weight="700" letter-spacing="-1">로테이션 파티 매칭</text>
    <text x="96" y="470" fill="#e7c9b8" font-size="30" font-weight="500" opacity="0.92">와인 · 커피 · 차 · 위스키 로테이션 모임</text>
    <text x="96" y="514" fill="#cfa9b6" font-size="26" font-weight="500" opacity="0.85">모르는 사람들이 진짜 친해지는 5분 라운드</text>
  </g>
</svg>
