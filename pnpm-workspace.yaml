packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@sentry/cli': true
  '@swc/core': true
  argon2: true
  esbuild: true
  msw: true
  prisma: true
  protobufjs: true
  unrs-resolver: true
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/engines'
  - '@sentry/cli'
  - '@swc/core'
  - argon2
  - esbuild
  - msw
  - prisma
  - protobufjs
  - unrs-resolver

minimumReleaseAgeExclude:
  - hasown
  - react-router
  - react-router-dom
  - tldts-core
  - zustand
  - '@storybook/addon-a11y@10.4.2'
  - '@storybook/addon-docs@10.4.2'
  - '@storybook/builder-vite@10.4.2'
  - '@storybook/csf-plugin@10.4.2'
  - '@storybook/react-dom-shim@10.4.2'
  - '@storybook/react-vite@10.4.2'
  - '@storybook/react@10.4.2'
  - storybook@10.4.2
  - react-hook-form@7.78.0
  - '@heejun/eslint-config@5.0.0'
  - '@heejun/prettier-config@3.0.0'
  - '@heejun/deskcloud@0.1.0'

overrides:
  zod@3.24.4: 3.25.76
